name = "worker-cms-plugin-checkin"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat","global_fetch_strictly_public"]

[assets]
directory = "./views"
binding = "VIEWS"
run_worker_first = true

[version_metadata]
binding = "CF_VERSION_METADATA"

[vars]
# Base URL of the CMS Worker — where this plugin reaches the Plugin API
# ({CMS_URL}/__cms/*, page read/write) to read events/lists/guests/labels and
# create/update guest pages.
CMS_URL = "https://cms.eventuai.com"

# Deployment note: the door kiosk now lives on CMS-session-gated admin routes
# (/admin/plugins/checkin/kiosk/* on the CMS origin), so this Worker no longer
# needs its own kiosk hostname. It must still be reachable at /checkin/* on the
# SAME public hostname as cms-plugin-events' PUBLIC_BASE_URL so that plugin's
# already-minted guest QR links resolve — configure a Cloudflare route scoped to
# that path on that zone, e.g.:
#   [[routes]]
#   pattern = "events.example.com/checkin/*"
#   zone_name = "example.com"

# ── Multi-tenant mode (several CMS hosts → this one plugin) ────────────────────
# One record per connected CMS. `secret` pairs with THAT CMS's Plugins →
# checkin → Shared secret; `vars.EVENTS_PLUGIN_SECRET` is that tenant's
# cms-plugin-events signKey (verifies its minted QR links, which now carry
# `?t=<tenant ref>`):
#   wrangler kv key put --binding TENANTS "tenant:https://cms1.example.com" \
#     '{"secret":"<32-byte hex>","vars":{"EVENTS_PLUGIN_SECRET":"<events signKey>"}}'
[[kv_namespaces]]
binding = "TENANTS"
id = "eb6dcb91c09b405fa05eb9490d343045"
